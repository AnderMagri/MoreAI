<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e10">
<title>Hebrew Learning App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=DM+Mono:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--bg2:#16161a;--bg3:#1e1e24;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0ece4;--text2:#9a9490;--text3:#5a5652;
  --gold:#c9a84c;--gold2:#e8c97a;--gold-dim:rgba(201,168,76,.12);
  --blue:#4a8fc4;--blue-dim:rgba(74,143,196,.1);
  --green:#5a9e7a;--green-dim:rgba(90,158,122,.1);
  --red:#c45a5a;--red-dim:rgba(196,90,90,.1);
  --purple:#9a7cc4;--purple-dim:rgba(154,124,196,.1);
  --r:12px;--rl:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}
.app{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);flex:1;max-height:100dvh}

/* HEADER */
.hdr{display:flex;align-items:center;padding:6px 10px;border-bottom:.5px solid var(--border);background:var(--bg3);gap:4px;flex-shrink:0}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;flex:1}
.tab{font-family:'DM Mono',monospace;font-size:13px;padding:10px 6px;min-height:44px;border-radius:6px;border:none;background:none;color:var(--text3);cursor:pointer;transition:.2s;touch-action:manipulation;display:flex;align-items:center;justify-content:center;flex:1}
.tab.on{background:var(--bg3);color:var(--gold)}

/* PROGRESS */
.pbar{height:3px;background:var(--bg3);flex-shrink:0}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s}

/* STAGE */
.stage{padding:12px 16px 4px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;letter-spacing:.04em}
.badge-c{background:var(--blue-dim);color:var(--blue);border:.5px solid rgba(74,143,196,.2);text-transform:uppercase}

/* CARD */
.card{padding:24px 16px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;flex:1;overflow:hidden}
.heb{font-family:'Frank Ruhl Libre',serif;font-size:110px;line-height:1.15;color:var(--text);direction:rtl;text-align:center;min-height:130px;display:flex;align-items:center;justify-content:center;transition:.3s}
.heb.w{font-size:72px;color:var(--blue)}.heb.t{font-size:72px;color:var(--green)}.heb.p{font-size:32px;color:var(--purple);min-height:auto;line-height:1.7}
.tl{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);margin-top:8px;text-align:center;letter-spacing:.03em}
.tl.w{color:var(--blue)}.tl.t{color:var(--green)}.tl.p{color:var(--purple);font-size:18px}
.ph{font-size:14px;color:var(--text3);margin-top:8px;font-style:italic;text-align:center}
.chips{display:flex;gap:6px;margin-top:12px;direction:rtl;flex-wrap:wrap;justify-content:center}
.chip{font-size:14px;padding:8px 14px;min-height:36px;border-radius:99px;border:.5px solid var(--border2);color:var(--text2);background:var(--bg3);direction:rtl;display:inline-flex;align-items:center}
.abtn{margin-top:16px;width:56px;height:56px;border-radius:50%;border:.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:.2s;touch-action:manipulation}
.abtn:active,.abtn.sp{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
@keyframes p{from{box-shadow:0 0 0 0 rgba(201,168,76,.3)}to{box-shadow:0 0 0 8px rgba(201,168,76,0)}}
.abtn.sp{animation:p .8s ease infinite alternate}

/* PRAYER VIEW */
.pray{display:none;padding:0 16px 8px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.pray.on{display:block}
.pray-hd{text-align:center;padding:14px 0 10px;border-bottom:.5px solid var(--border)}
.pray-hd-h{font-family:'Frank Ruhl Libre',serif;font-size:34px;color:var(--purple);direction:rtl}
.pray-hd-t{font-family:'Playfair Display',serif;font-size:18px;color:var(--text2);margin-top:4px}
.pray-hd-d{font-size:13px;color:var(--text3);margin-top:4px}
.pl{padding:14px 10px;border-bottom:.5px solid var(--border);cursor:pointer;transition:.15s;border-radius:8px;min-height:48px}
.pl:active{background:rgba(255,255,255,.03)}
.pl:last-child{border-bottom:none}
.pl.act{background:var(--purple-dim);padding:14px 12px}
.pl-h{font-family:'Frank Ruhl Libre',serif;font-size:24px;direction:rtl;text-align:right;color:var(--purple);line-height:1.5}
.pl-t{font-size:13px;color:var(--text2);margin-top:3px}
.pl-p{font-family:'Playfair Display',serif;font-size:14px;color:var(--text3);margin-top:2px;font-style:italic}

/* TRANSLATION BAR */
.tr-bar{border-top:.5px solid var(--border);padding:12px 16px;background:var(--bg3);flex-shrink:0}
.tr-l{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.tr-t{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);line-height:1.4}
.tr-t.em{color:var(--text3);font-size:14px;font-family:'DM Mono',monospace;font-style:italic}

/* QUIZ */
.qa{display:none;flex-direction:column;align-items:center;gap:10px;width:100%;margin-top:12px}
.qa.on{display:flex}
.qi{font-family:'DM Mono',monospace;font-size:18px;text-align:center;padding:12px 16px;min-height:48px;width:90%;max-width:300px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none}
.qi:focus{border-color:var(--gold)}.qi.ok{border-color:var(--green);color:var(--green)}.qi.no{border-color:var(--red);color:var(--red)}
.qf{font-size:14px;min-height:20px}.qf.ok{color:var(--green)}.qf.no{color:var(--red)}
.qs{font-size:12px;color:var(--text3);padding:8px 16px;text-align:center;border-top:.5px solid var(--border);flex-shrink:0}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:.5px solid var(--border);background:var(--bg);flex-shrink:0;gap:10px}
.nb{font-family:'DM Mono',monospace;font-size:15px;color:var(--text2);background:none;border:.5px solid var(--border2);border-radius:var(--r);padding:12px 20px;min-height:48px;cursor:pointer;transition:.2s;touch-action:manipulation;display:inline-flex;align-items:center;white-space:nowrap}
.nb:active:not(:disabled){border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.nb:disabled{opacity:.25}
.nb.pr{background:var(--gold-dim);color:var(--gold);border-color:rgba(201,168,76,.3)}
.si{font-size:13px;color:var(--text3)}

/* BOTTOM SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10;transition:opacity .3s}
.overlay.on{display:block}
.bsheet{position:fixed;bottom:0;left:0;right:0;z-index:11;background:var(--bg2);border-top-left-radius:20px;border-top-right-radius:20px;max-height:80dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1)}
.bsheet.on{transform:translateY(0)}
.bsheet-handle{width:40px;height:4px;border-radius:99px;background:var(--text3);margin:10px auto 6px;flex-shrink:0}
.bsheet-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);text-align:center;padding:4px 16px 12px;flex-shrink:0}
.bsheet-cats{display:flex;gap:4px;padding:0 12px 10px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
.bcat{font-family:'DM Mono',monospace;font-size:12px;padding:8px 14px;min-height:40px;border-radius:99px;border:.5px solid var(--border2);color:var(--text3);background:none;cursor:pointer;touch-action:manipulation;display:inline-flex;align-items:center;transition:.2s}
.bcat.on{background:var(--purple-dim);color:var(--purple);border-color:rgba(154,124,196,.3)}
.bsheet-list{overflow-y:auto;flex:1;padding:0 12px 20px;-webkit-overflow-scrolling:touch}
.bsheet-list::-webkit-scrollbar{width:3px}.bsheet-list::-webkit-scrollbar-track{background:transparent}.bsheet-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.bli{display:flex;align-items:center;gap:12px;padding:14px 12px;border-bottom:.5px solid var(--border);cursor:pointer;border-radius:8px;min-height:56px;transition:.15s}
.bli:active{background:rgba(255,255,255,.03)}
.bli.act{background:var(--purple-dim)}
.bli-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center}
.bli-info{flex:1;min-width:0}
.bli-t{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bli-d{font-size:12px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bli-heb{font-family:'Frank Ruhl Libre',serif;font-size:18px;color:var(--purple);direction:rtl;flex-shrink:0}

/* TEFILOT NAV */
.tnav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:.5px solid var(--border);background:var(--bg);flex-shrink:0;gap:8px}
.tnav-btn{font-family:'DM Mono',monospace;font-size:15px;color:var(--purple);background:var(--purple-dim);border:.5px solid rgba(154,124,196,.3);border-radius:var(--r);padding:12px 20px;min-height:48px;cursor:pointer;transition:.2s;touch-action:manipulation;display:inline-flex;align-items:center;justify-content:center;flex:1}
.tnav-btn:active{background:rgba(154,124,196,.25)}
.tnav-audio{width:48px;height:48px;border-radius:50%;border:.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:.2s;touch-action:manipulation;flex-shrink:0}
.tnav-audio:active,.tnav-audio.sp{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

/* ANIM */
.si-in{animation:si .25s ease}
@keyframes si{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */
@media(max-width:360px){.heb{font-size:88px;min-height:100px}.heb.w,.heb.t{font-size:56px}.tl{font-size:22px}.tab{font-size:12px;padding:8px 4px}}
@media(max-height:650px){.card{min-height:180px;padding:16px 14px 10px}.heb{font-size:80px;min-height:90px}}
.pray::-webkit-scrollbar{width:3px}.pray::-webkit-scrollbar-track{background:transparent}.pray::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div class="tabs" id="tabs">
      <button class="tab on" data-p="letters">letras</button>
      <button class="tab" data-p="words">palavras</button>
      <button class="tab" data-p="torah">torá</button>
      <button class="tab" data-p="tefilot">tefilot</button>
      <button class="tab" data-p="quiz">quiz</button>
    </div>
  </div>
  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div class="stage"><span id="stg"></span><span id="stgR"></span></div>
  <div class="card" id="card">
    <div class="heb si-in" id="heb"></div>
    <div class="tl" id="tl"></div>
    <div class="ph" id="ph"></div>
    <div class="chips" id="chips" style="display:none"></div>
    <button class="abtn" id="abtn" title="ouvir em hebraico">&#9835;</button>
    <div class="qa" id="qa">
      <input type="text" class="qi" id="qi" placeholder="transliteração..." autocomplete="off" spellcheck="false">
      <div class="qf" id="qf"></div>
    </div>
  </div>
  <div class="pray" id="pray"></div>
  <div class="tr-bar" id="trbar">
    <div class="tr-l" id="trl">tradução</div>
    <div class="tr-t em" id="trt">carregando...</div>
  </div>
  <div class="qs" id="qsc" style="display:none"></div>
  <div class="nav" id="mainNav">
    <button class="nb" id="bp" onclick="prev()">&#8592; anterior</button>
    <span class="si" id="si">1 / 1</span>
    <button class="nb pr" id="bn" onclick="next()">próximo &#8594;</button>
  </div>
  <div class="tnav" id="tefNav" style="display:none">
    <button class="tnav-btn" id="blist" onclick="openSheet()">&#9776; tefilot</button>
    <button class="tnav-audio" id="abtn2" onclick="speak()">&#9835;</button>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="overlay" id="bsOverlay" onclick="closeSheet()"></div>
<div class="bsheet" id="bsheet">
  <div class="bsheet-handle"></div>
  <div class="bsheet-title">Tefilot & Shirim</div>
  <div class="bsheet-cats" id="bsCats"></div>
  <div class="bsheet-list" id="bsList"></div>
</div>

<script>
/* ─── UTILS ─── */
const $=id=>document.getElementById(id);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.random()*i+1|0;[b[i],b[j]]=[b[j],b[i]]}return b};

/* ─── STATE ─── */
let D={letters:[],words:[],torah:[],tefilot:[]};
let phase='letters',idx=0,sL=[],sW=[],sT=[];
let qI=[],qIdx=0,qOK=0,qDone=false;
let tIdx=0,pLine=0;
let bsCat='todas';
const SK='hebrew-v3';

/* ─── PROGRESS ─── */
function lP(){try{return JSON.parse(localStorage.getItem(SK))||{l:{},s:0,d:null}}catch{return{l:{},s:0,d:null}}}
function sP(p){localStorage.setItem(SK,JSON.stringify(p))}
function uStreak(){const p=lP(),t=new Date().toISOString().slice(0,10);if(p.d===t)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);p.s=p.d===y?p.s+1:1;p.d=t;sP(p)}

/* ─── DATA HELPERS ─── */
function cList(){return phase==='letters'?sL:phase==='words'?sW:phase==='torah'?sT:[]}
function cData(){return phase==='quiz'?qI[qIdx]:phase==='tefilot'?D.tefilot[tIdx]:cList()[idx]}

/* ─── SPEAK HEBREW ─── */
function speak(txt){
  if(!window.speechSynthesis)return;
  const b=$('abtn'),b2=$('abtn2');speechSynthesis.cancel();
  let s=txt;
  if(!s){if(phase==='tefilot'){const pr=D.tefilot[tIdx];s=pr?.lines[pLine]?.heb||pr?.title||''}
  else if(phase==='quiz'){const d=qI[qIdx];s=d?(d.heSpeak||d.char):''}
  else{const d=cData();s=d?(d.heSpeak||d.char):''}}
  const u=new SpeechSynthesisUtterance(s);u.lang='he-IL';u.rate=.8;
  const mark=()=>{b.classList.add('sp');if(b2)b2.classList.add('sp')};
  const unmark=()=>{b.classList.remove('sp');if(b2)b2.classList.remove('sp')};
  mark();u.onend=u.onerror=unmark;
  speechSynthesis.speak(u);
}
$('abtn').onclick=()=>speak();

/* ─── QUIZ ─── */
function startQ(){const a=[...D.letters,...D.words,...D.torah];qI=shuffle(a).slice(0,10);qIdx=0;qOK=0;qDone=false}
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[''`]/g,"'").trim()}
function checkQ(){
  if(qDone)return;const i=$('qi'),f=$('qf'),ans=norm(i.value);if(!ans)return;
  qDone=true;const acc=qI[qIdx].translit.split(' / ').map(norm);
  if(acc.includes(ans)){qOK++;i.classList.add('ok');f.textContent='correto!';f.className='qf ok'}
  else{i.classList.add('no');f.textContent='resposta: '+qI[qIdx].translit;f.className='qf no'}
  uQS();setTimeout(()=>{if(qIdx<qI.length-1){qIdx++;qDone=false;rQuiz()}else rQEnd()},1600);
}
function rQuiz(){
  const d=qI[qIdx],h=$('heb'),t=$('tl'),p=$('ph');
  rCS(h);anim(h);h.textContent=d.char;h.className='heb si-in';
  t.textContent='';t.style.display='none';
  p.textContent=d.translation?'? → '+d.translation:'';
  $('stg').textContent='quiz · '+(qIdx+1)+'/'+qI.length;$('stgR').innerHTML='';
  $('chips').style.display='none';$('qa').classList.add('on');
  const qi=$('qi');qi.value='';qi.className='qi';$('qf').textContent='';$('qf').className='qf';qi.focus();
  $('pf').style.width=((qIdx/Math.max(qI.length-1,1))*100)+'%';
  $('si').textContent=(qIdx+1)+' / '+qI.length;
  $('trbar').style.display='none';$('pray').classList.remove('on');
  $('qsc').style.display='block';$('mainNav').style.display='';$('tefNav').style.display='none';
  $('card').style.display='';uQS();
}
function rQEnd(){
  const h=$('heb'),t=$('tl'),p=$('ph');
  h.textContent=qOK+'/'+qI.length;h.className='heb si-in';
  h.style.fontFamily="'DM Mono',monospace";h.style.fontSize='56px';
  h.style.color=qOK>=7?'var(--green)':'var(--gold)';h.style.minHeight='80px';
  t.style.display='block';t.textContent=qOK>=7?'Excelente!':qOK>=4?'Bom trabalho!':'Continue praticando!';
  t.className='tl';p.textContent='toque "próximo" para recomeçar';$('qa').classList.remove('on');
  $('pf').style.width='100%';$('bn').disabled=false;$('bn').textContent='novo quiz →';
}
function uQS(){$('qsc').textContent='acertos: '+qOK+' / '+(qIdx+(qDone?1:0))}

/* ─── BOTTOM SHEET ─── */
const catLabels={'todas':'todas','shabat':'shabat','diária':'diária','serviço':'serviço','havdalah':'havdalah','pessach':'pessach','chanukah':'chanukah'};
const catIcons={'shabat':'🕯️','diária':'☀️','serviço':'🕍','havdalah':'🌙','pessach':'🍷','chanukah':'🕎'};

function openSheet(){
  renderSheet();
  $('bsOverlay').classList.add('on');
  $('bsheet').classList.add('on');
}
function closeSheet(){
  $('bsOverlay').classList.remove('on');
  $('bsheet').classList.remove('on');
}
function renderSheet(){
  const cats=['todas',...new Set(D.tefilot.map(t=>t.category))];
  const cc=$('bsCats');cc.innerHTML='';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='bcat'+(c===bsCat?' on':'');
    b.textContent=catLabels[c]||c;
    b.onclick=()=>{bsCat=c;renderSheet()};
    cc.appendChild(b);
  });
  const list=$('bsList');list.innerHTML='';
  const filtered=bsCat==='todas'?D.tefilot:D.tefilot.filter(t=>t.category===bsCat);
  filtered.forEach((t,fi)=>{
    const realIdx=D.tefilot.indexOf(t);
    const d=document.createElement('div');
    d.className='bli'+(realIdx===tIdx?' act':'');
    const icon=catIcons[t.category]||'📜';
    d.innerHTML='<div class="bli-icon">'+icon+'</div><div class="bli-info"><div class="bli-t">'+t.titlePt+'</div><div class="bli-d">'+t.description+'</div></div><div class="bli-heb">'+t.title+'</div>';
    d.onclick=()=>{tIdx=realIdx;pLine=0;closeSheet();rTef()};
    list.appendChild(d);
  });
}

/* ─── TEFILOT ─── */
function rTef(){
  const pr=D.tefilot[tIdx];
  $('card').style.display='none';$('pray').classList.add('on');
  $('trbar').style.display='';$('qsc').style.display='none';$('qa').classList.remove('on');
  $('mainNav').style.display='none';$('tefNav').style.display='';
  $('stg').textContent='tefilá · '+(pr.category||'');$('stgR').innerHTML='';
  const c=$('pray');c.innerHTML='';
  c.innerHTML='<div class="pray-hd"><div class="pray-hd-h">'+pr.title+'</div><div class="pray-hd-t">'+pr.titlePt+'</div><div class="pray-hd-d">'+pr.description+'</div></div>';
  pr.lines.forEach((l,i)=>{
    const d=document.createElement('div');d.className='pl'+(i===pLine?' act':'');
    d.innerHTML='<div class="pl-h">'+l.heb+'</div><div class="pl-t">'+l.tr+'</div><div class="pl-p">'+l.pt+'</div>';
    d.onclick=()=>{pLine=i;hPL();speak(l.heb)};c.appendChild(d);
  });
  const cur=pr.lines[pLine];$('trt').textContent=cur?cur.pt:pr.description;$('trt').className='tr-t';
  $('trl').textContent='tradução · linha '+(pLine+1);
  $('pf').style.width=((tIdx/Math.max(D.tefilot.length-1,1))*100)+'%';
}
function hPL(){
  document.querySelectorAll('.pl').forEach((e,i)=>e.classList.toggle('act',i===pLine));
  const pr=D.tefilot[tIdx],cur=pr.lines[pLine];
  if(cur){$('trt').textContent=cur.pt;$('trl').textContent='tradução · linha '+(pLine+1)}
  const a=document.querySelector('.pl.act');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ─── RENDER ─── */
function rCS(e){e.style.fontFamily='';e.style.fontSize='';e.style.color='';e.style.minHeight=''}
function anim(e){e.classList.remove('si-in');void e.offsetWidth;e.classList.add('si-in')}

function setP(p){
  phase=p;idx=0;pLine=0;tIdx=0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.p===p));
  if(p==='quiz'){startQ();rQuiz();return}
  if(p==='tefilot'){rTef();return}
  render();
}

function render(){
  const d=cData();if(!d)return;const list=cList(),tot=list.length;
  $('pf').style.width=(tot<=1?100:(idx/(tot-1))*100)+'%';
  $('si').textContent=(idx+1)+' / '+tot;
  const h=$('heb'),t=$('tl'),p=$('ph'),tr=$('trt'),sg=$('stg'),sr=$('stgR'),ch=$('chips');
  rCS(h);anim(h);h.textContent=d.char;t.textContent=d.translit;t.style.display='block';p.textContent=d.phonetic;
  $('qa').classList.remove('on');$('card').style.display='';$('pray').classList.remove('on');
  $('trbar').style.display='';$('qsc').style.display='none';$('trl').textContent='tradução';
  $('mainNav').style.display='';$('tefNav').style.display='none';
  sr.innerHTML='';

  if(phase==='letters'){
    h.className='heb si-in';t.className='tl';sg.textContent='letra · '+(d.vowel||'');
    ch.style.display='none';tr.textContent=d.translation||'—';tr.className=d.translation?'tr-t':'tr-t em';
  }else if(phase==='words'){
    h.className='heb w si-in';t.className='tl w';
    sg.innerHTML='palavra · <span class="badge badge-c">'+(d.category||'')+'</span>';
    tr.textContent=d.translation;tr.className='tr-t';
    ch.style.display='flex';ch.innerHTML=(d.letters||[]).map(l=>'<div class="chip">'+l+'</div>').join('');
  }else if(phase==='torah'){
    h.className='heb t si-in';t.className='tl t';
    sg.innerHTML='torá · <span class="badge badge-c">'+(d.category||'')+'</span>';
    tr.textContent=d.translation;tr.className='tr-t';
    ch.style.display=d.example?'flex':'none';ch.innerHTML=d.example?'<div class="chip" style="direction:rtl">'+d.example+'</div>':'';
  }
  $('bp').disabled=idx===0;$('bn').disabled=idx===list.length-1;$('bn').textContent='próximo →';
}

function next(){
  if(phase==='quiz'){startQ();rQuiz();return}
  if(phase==='tefilot')return;
  if(idx<cList().length-1){idx++;render()}
}
function prev(){
  if(phase==='quiz')return;
  if(phase==='tefilot')return;
  if(idx>0){idx--;render()}
}

/* ─── KEYBOARD (kept for dev) ─── */
document.addEventListener('keydown',e=>{
  if(document.activeElement===$('qi')){if(e.key==='Enter'){e.preventDefault();checkQ()}return}
  if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();
  if(e.key===' '){e.preventDefault();speak()}
  if(phase==='tefilot'){
    if(e.key==='ArrowDown'){e.preventDefault();const pr=D.tefilot[tIdx];if(pLine<pr.lines.length-1){pLine++;hPL()}}
    if(e.key==='ArrowUp'){e.preventDefault();if(pLine>0){pLine--;hPL()}}
  }
});

/* ─── TOUCH: swipe nav ─── */
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>60){dx<0?next():prev()}},{passive:true});

/* ─── TABS ─── */
$('tabs').onclick=e=>{const t=e.target.closest('.tab');if(t)setP(t.dataset.p)};

/* ─── LOAD DATA ─── */
fetch('data.json').then(r=>r.json()).then(d=>{
  D=d;sL=shuffle(d.letters);sW=shuffle(d.words);sT=shuffle(d.torah);
  uStreak();render();
}).catch(()=>{$('trt').textContent='Erro ao carregar dados. Verifique data.json.';$('trt').className='tr-t'});
</script>
</body>
</html>
